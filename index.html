<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Valorant-themed Tournament Fixture Builder — create knockout brackets with a premium esports UI." />
  <title>VALORANT Tournament Fixture Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background layer -->
  <div class="bg-layer"></div>

  <!-- CSS-only floating particles -->
  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- ======== MAIN CONTAINER ======== -->
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo-row">
        <img src="Grafest_Logo.png" alt="Grafest Logo" class="header-logo" />
        <span class="logo-divider"></span>
        <img src="Valorant_logo_-_pink_color_version.svg.png" alt="Valorant Logo" class="header-logo valorant-logo" />
      </div>
      <h1>Valorant Tournament</h1>
      <p class="subtitle">Fixture Builder</p>
    </header>

    <!-- ——— PUBLIC VIEWER STATE ——— -->
    <div id="empty-state" style="text-align:center; padding:50px; font-family:'Orbitron', sans-serif; color:var(--val-muted);">
      <h2 style="font-size:2rem; margin-bottom:10px;">STAND BY</h2>
      <p>Waiting for Administrator to generate the tournament bracket...</p>
    </div>

  </div>

  <!-- ——— BRACKET OUTPUT (full-width) ——— -->
  <div class="bracket-wrapper" id="bracket-wrapper" style="display:none; transition: opacity 0.5s;">
    <div class="container">
      <section class="glass-card bracket-card">
        <h2 id="public-title">Knockout Bracket</h2>
        <div class="bracket-scroll">
          <div class="bracket" id="bracket"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- SheetJS & jsPDF CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- App logic -->
  <script src="script.js"></script>
</body>
</html>
